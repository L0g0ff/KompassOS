# IPMI / server management toolbox
# Usage: distrobox-assemble create --file ipmi-distrobox.ini
#
# In-band IPMI (/dev/ipmi0) works automatically: distrobox shares the host
# /dev, so the device is visible as long as the host has the ipmi_si and
# ipmi_devintf kernel modules loaded. Out-of-band (ipmitool -I lanplus -H ...,
# racadm -r ..., sum -i ...) only needs network access.

[ipmi-tools]
# Base configuration
image=ubuntu:22.04
pull=true
# CLI-only toolbox: no services run inside, so no init system is needed.
init=false
replace=true
start_now=true

# Mount this directory read-only so the setup script and any vendor
# binaries dropped here (Supermicro SUM, Dell iDRAC Tools, HP) are reachable.
additional_flags="--volume /usr/share/kompassos/distrobox/ipmi-tools:/usr/share/kompassos/distrobox/ipmi-tools:ro"

# Generic IPMI tooling (works for Dell/HP/Supermicro, in- and out-of-band)
additional_packages="ipmitool freeipmi-tools openipmi"
# Management / scripting utilities
additional_packages="net-tools iproute2 iputils-ping curl wget"
additional_packages="snmp openssh-client jq unzip"

# Pre-initialization
pre_init_hooks="apt update;"

# Vendor tools: Dell idracadm7/8 via Dell's OpenManage apt repo, plus Supermicro
# SUM / HP from archives dropped in the mounted directory (skipped if absent).
init_hooks="bash /usr/share/kompassos/distrobox/ipmi-tools/setup-ipmi-init.sh;"

# Export the CLI tools to the host (~/.local/bin) so they can be run directly,
# without entering the box. idracadm7 is created by the setup script above.
exported_bins="/usr/local/bin/idracadm7"
exported_bins="/usr/local/bin/idracadm8"
exported_bins="/usr/bin/ipmitool"
exported_bins="/usr/sbin/ipmi-sensors"
exported_bins="/usr/sbin/ipmipower"
exported_bins="/usr/sbin/bmc-info"
exported_bins="/usr/sbin/ipmi-config"
